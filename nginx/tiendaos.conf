# TiendaOS nginx configuration — path-based routing
# Deploy to: /etc/nginx/sites-available/tiendaos
# Then: ln -s /etc/nginx/sites-available/tiendaos /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# URLs:
#   dylanlopez.com/terminal  — POS cashier terminal
#   dylanlopez.com/precios   — Price checker kiosk (no login)
#   dylanlopez.com/admin     — Admin panel (dashboard, reports, inventory)
#   dylanlopez.com/          — Default (terminal with full nav)

# Production
server {
    listen 80;
    server_name dylanlopez.com;

    root /opt/tiendaos/frontend/dist;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: all paths → index.html (React handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# Staging
server {
    listen 80;
    server_name staging.dylanlopez.com;

    root /opt/tiendaos-staging/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
